// 固定 key，從舊版 key 遷移資料
const JOBS_KEY = "paigong_jobs_v1";
const CUSTOMERS_KEY = "paigong_customers_v1";
(function migrateOldData(){
  const oldJobsKey = "dispatchJobsCompleteV8_engineers";
  const oldCustKey = "dispatchCustomersCompleteV8_engineers";

})();
let jobs=JSON.parse(localStorage.getItem(JOBS_KEY)||"[]");
let customers=JSON.parse(localStorage.getItem(CUSTOMERS_KEY)||"[]");
let dragId=null;
let editingJobId=null;

document.getElementById("viewDate").valueAsDate=new Date();

const nowForList = new Date();
document.getElementById("listMonth").value = `${nowForList.getFullYear()}-${String(nowForList.getMonth()+1).padStart(2,"0")}`;

times.forEach(t=>{

    const op=document.createElement("option"); op.value=t; op.textContent=t; document.getElementById(id).appendChild(op);

});

document.getElementById("viewDate").addEventListener("change",renderSchedule);
document.getElementById("fCustomerCode").addEventListener("change",fillCustomerByCode);
document.getElementById("fCustomerCode").addEventListener("input",updateCodeName);
document.getElementById("fCustomerName").addEventListener("input",updateCodeName);
let addrDebounce = null;
document.getElementById("fAddress").addEventListener("input",()=>{
  const p=parseTaiwanAddress(document.getElementById("fAddress").value);
  document.getElementById("fCity").value=p.city;
  document.getElementById("fDistrict").value=p.district;
  syncCityChecks();
  clearTimeout(addrDebounce);
  addrDebounce = setTimeout(()=>{ renderAvailableSlots(); }, 800);
});document.getElementById("fEngineer").addEventListener("change", renderAvailableSlots);
document.getElementById("fDate").addEventListener("change", renderAvailableSlots);
document.getElementById("fStartTime").addEventListener("change", syncEndTimeByStart);
document.getElementById("fEndTime").addEventListener("change", renderAvailableSlots);

const taiwanCities=["台北市","新北市","桃園市","台中市","台南市","高雄市","基隆市","新竹市","嘉義市","新竹縣","苗栗縣","彰化縣","南投縣","雲林縣","嘉義縣","屏東縣","宜蘭縣","花蓮縣","台東縣","澎湖縣","金門縣","連江縣"];
function renderCityChecks(){
  const box=document.getElementById("cityCheckList");
  if(!box) return;
  box.innerHTML=taiwanCities.map(c=>`<label><input type="radio" name="cityPick" value="${c}" onchange="setCityFromCheck(this.value)">${c}</label>`).join("");
}
function setCityFromCheck(city){
  document.getElementById("fCity").value=city;
  renderAvailableSlots();
}
function syncCityChecks(){
  const city=document.getElementById("fCity").value;
  document.querySelectorAll('input[name="cityPick"]').forEach(x=>x.checked=(x.value===city));
}
function syncEndTimeByStart(){
  const s=timeIndex(document.getElementById("fStartTime").value);
  const e=timeIndex(document.getElementById("fEndTime").value);
  if(s<0) return;
  if(e<0 || e<s){
    document.getElementById("fEndTime").value=times[Math.min(s+1,times.length-1)];
  }
}


function showPage(pageId){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  if(pageId==="schedulePage")document.getElementById("tabSchedule").classList.add("active");

  if(pageId==="customerPage")document.getElementById("tabCustomer").classList.add("active");
  if(pageId==="listPage"){document.getElementById("tabList").classList.add("active");renderJobList();}
}

function saveJobs(){localStorage.setItem(JOBS_KEY,JSON.stringify(jobs))}
function saveCustomers(){localStorage.setItem(CUSTOMERS_KEY,JSON.stringify(customers));updateCustomerCodeList()}

function escapeHtml(text){
  return String(text||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function mapUrl(address){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(address||"")}
function directionUrl(origin,destination){
  return "https://www.google.com/maps/dir/?api=1&origin="+encodeURIComponent(origin||"")+"&destination="+encodeURIComponent(destination||"")+"&travelmode=driving";
}
function cleanCityDistrict(city,district){
  city=String(city||"").trim();
  district=String(district||"").trim();
  if(district && city && district.startsWith(city)) return district;
  if(city && district) return city + district;
  return district || city || "";
}
function getCurrentFormPlace(){
  const city=document.getElementById("fCity") ? document.getElementById("fCity").value.trim() : "";
  const district=document.getElementById("fDistrict") ? document.getElementById("fDistrict").value.trim() : "";
  return cleanCityDistrict(city,district);
}

function parseTaiwanAddress(address){
  address=String(address||"").trim();
  let city="", district="";
  const cityMatch=address.match(/^(台北市|臺北市|新北市|桃園市|台中市|臺中市|台南市|臺南市|高雄市|基隆市|新竹市|嘉義市|新竹縣|苗栗縣|彰化縣|南投縣|雲林縣|嘉義縣|屏東縣|宜蘭縣|花蓮縣|台東縣|臺東縣|澎湖縣|金門縣|連江縣)/);
  if(cityMatch){
    city=cityMatch[1].replace("臺","台");
    const rest=address.slice(cityMatch[1].length);
    const districtMatch=rest.match(/^(.{1,5}?(區|鄉|鎮|市))/);
    if(districtMatch) district=districtMatch[1];
  }
  return {city,district};
}

function updateCodeName(){

function addJobFromForm(){
  const job=getFormJob();
  if(!job.engineer||!job.date||!job.startTime){alert("請填工程人員、排工日期、排工時間");return}
  if(!job.customerCode&&!job.customerName){alert("請至少輸入客編或客名");return}

  const wasEditing = !!editingJobId;
  if(editingJobId){
    const idx=jobs.findIndex(x=>x.id===editingJobId);
    if(idx>=0){

      editingJobId=null;
      document.getElementById("saveJobBtn").textContent="儲存派工";
    }
  }else{
    jobs.push(job);
    saveJobs();

  enableScheduleDrag();
  renderSchedule();
  setTimeout(setupFixedBottomScrollbar, 100);
  setupFixedBottomScrollbar();
  renderJobList();

}

function getEngineerFreeRanges(engineer, date){
  const dayJobs = jobs.filter(j => j.date === date && j.engineer === engineer);
  const busyIndices = new Set();
  dayJobs.forEach(j => {
    const s = timeIndex(j.startTime || j.time);
    const span = calcSpan(j);
    for(let i = s; i < s + span && i < times.length; i++){
      if(i >= 0) busyIndices.add(i);
    }
  });
  const freeRanges = [];
  let rangeStart = null;
  for(let i = 0; i < times.length; i++){
    if(!busyIndices.has(i)){
      if(rangeStart === null) rangeStart = i;
    } else {
      if(rangeStart !== null){ freeRanges.push({from: rangeStart, to: i - 1}); rangeStart = null; }
    }
  }
  if(rangeStart !== null) freeRanges.push({from: rangeStart, to: times.length - 1});
  return { freeRanges, dayJobs };
}

// ===== 車程自動計算（Nominatim geocoding + OSRM routing，免費不需 API Key）=====
const geoCache = {};   // address -> {lat,lon} or null
const travelCache = {}; // "lat1,lon1|lat2,lon2" -> "XX 分鐘" or null

async function geocodeAddress(addr){
  if(!addr) return null;
  const key = addr.trim();
  if(key in geoCache) return geoCache[key];
  try{
    const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(key);
    const res = await fetch(url, {headers:{"Accept-Language":"zh-TW,zh","User-Agent":"dispatch-system"}});
    const data = await res.json();
    const result = data && data[0] ? {lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon)} : null;
    geoCache[key] = result;
    return result;
  }catch(e){ geoCache[key]=null; return null; }
}

async function fetchDrivingMinutes(addrA, addrB){
  if(!addrA || !addrB) return null;
  const cacheKey = addrA + "|" + addrB;
  if(cacheKey in travelCache) return travelCache[cacheKey];
  const [gA, gB] = await Promise.all([geocodeAddress(addrA), geocodeAddress(addrB)]);
  if(!gA || !gB){ travelCache[cacheKey]=null; return null; }
  try{
    const url = `https://router.project-osrm.org/route/v1/driving/${gA.lon},${gA.lat};${gB.lon},${gB.lat}?overview=false`;
    const res = await fetch(url);
    const data = await res.json();
    if(data.code==="Ok" && data.routes && data.routes[0]){
      const mins = Math.round(data.routes[0].duration / 60);
      const label = mins < 60 ? `約 ${mins} 分鐘` : `約 ${Math.floor(mins/60)} 時 ${mins%60} 分`;
      travelCache[cacheKey] = label;
      return label;
    }
    travelCache[cacheKey]=null; return null;
  }catch(e){ travelCache[cacheKey]=null; return null; }
}

async function updateTravelTags(currentAddr){
  // 找所有 .travel-tag span，依 data-from / data-to 非同步填入
  const tags = document.querySelectorAll(".travel-tag[data-from][data-to]");
  for(const tag of tags){
    const from = tag.dataset.from;
    const to = tag.dataset.to;
    if(!from || !to){ continue; }
    tag.textContent = "計算中…";
    const mins = await fetchDrivingMinutes(from, to);

  }
}

function renderAvailableSlots(){

  const listEl = document.getElementById("availableSlotList");

  if(!date){ panel.style.display="none"; return; }

  const formPlace = getCurrentFormPlace();
  const currentAddr = document.getElementById("fAddress") ? document.getElementById("fAddress").value.trim() : "";
  titleEl.textContent = date + (formPlace ? `（${formPlace}）` : "");

  const targetEngineers = engineers;
  let html = "";

  targetEngineers.forEach(eng => {
    const code = engineerCodes[eng] || eng;
    const { freeRanges, dayJobs } = getEngineerFreeRanges(eng, date);
    const isSelected = (selEngineer === eng);

    const rowBg = isSelected ? "#e8f4fd" : "#fff";
    const rowBorder = isSelected ? "2px solid #3498db" : "1px solid #dce8f7";

    html += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;padding:8px 10px;background:${rowBg};border:${rowBorder};border-radius:6px;">`;

        onclick="document.getElementById('fEngineer').value='${eng}';renderAvailableSlots();"
        title="點擊選擇此工程師">${code}</span>
    </div>`;
    html += `<div style="flex:1;display:flex;flex-wrap:wrap;gap:5px;align-items:center;">`;

    if(freeRanges.length === 0){
      html += `<span style="color:#c0392b;font-size:12px;">當天已排滿</span>`;
    } else {
      freeRanges.forEach(r => {
        const fromT = times[r.from];
        const toT = times[r.to];
        const slots = r.to - r.from;
        const color = slots >= 3 ? "#1a7a2e" : slots >= 1 ? "#7a5a00" : "#555";
        const bg    = slots >= 3 ? "#d4edda" : slots >= 1 ? "#fff3cd" : "#f1f1f1";
        const bdr   = slots >= 3 ? "#a3d6b0" : slots >= 1 ? "#ffc107" : "#ccc";
        const label = fromT === toT ? fromT : `${fromT}～${toT}`;
        html += `<span style="display:inline-block;padding:3px 9px;border-radius:14px;border:1px solid ${bdr};background:${bg};color:${color};font-weight:bold;cursor:pointer;font-size:12px;"
          onclick="document.getElementById('fEngineer').value='${eng}';document.getElementById('fStartTime').value='${fromT}';document.getElementById('fEndTime').value='${toT}';renderAvailableSlots();"
          title="點擊選擇此工程師與時間段">${label}</span>`;
      });
    }

    // 已排時段 + 車程
    if(dayJobs.length > 0){
      dayJobs.forEach(j => {
        const s = j.startTime||j.time;
        const e = j.endTime;
        const place = cleanCityDistrict(j.city,j.district) || "";
        const codename = escapeHtml(j.codeName || j.customerName || j.customerCode || "");
        const hasAddrs = currentAddr && j.address;
        const travelSpan = hasAddrs
          ? `<span class="travel-tag" data-from="${escapeHtml(currentAddr)}" data-to="${escapeHtml(j.address)}"
              style="display:inline-block;padding:1px 6px;border-radius:10px;background:#f1f1f1;border:1px solid #ccc;color:#888;font-size:11px;margin-left:3px;">計算中…</span>`
          : `<span style="font-size:10px;color:#aaa;margin-left:3px;">（未填地址）</span>`;
        html += `<span style="display:inline-block;padding:3px 8px;border-radius:12px;background:#fde8e8;border:1px solid #f5c6cb;color:#721c24;font-size:11px;line-height:1.5;">
          ${s}${e?"~"+e:""} ${codename}${place?" "+escapeHtml(place):""}${travelSpan}</span>`;
      });
    }

    html += `</div></div>`;
  });

  listEl.innerHTML = html;
  panel.style.display = "block";

  // 非同步填入車程
  if(currentAddr){
    updateTravelTags(currentAddr);
  }

  return times.indexOf(t);
}

function parseDateLocal(str){
  const [y,m,d]=String(str).split("-").map(Number);
  return new Date(y, (m||1)-1, d||1);
}

function formatDateLocal(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function addDays(date,days){
  const d=new Date(date);
  d.setDate(d.getDate()+days);
  return d;
}

function getMonday(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=(day===0 ? -6 : 1-day);
  d.setDate(d.getDate()+diff);
  return d;
}

function getScheduleDates(){
  const base=parseDateLocal(document.getElementById("viewDate").value);
  return Array.from({length:7},(_,i)=>formatDateLocal(addDays(base,i)));
}

function moveSchedule(step){
  const d=parseDateLocal(document.getElementById("viewDate").value);
  d.setDate(d.getDate()+step*7);
  document.getElementById("viewDate").value=formatDateLocal(d);
  renderSchedule();
}

function getWeekdayName(dateStr){
  const names=["日","一","二","三","四","五","六"];
  const d=parseDateLocal(dateStr);
  return "週"+names[d.getDay()];
}

    toast.style.cssText = `
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);

// ===== 卡片底部拖拉調整時間 =====
let resizingJobId = null;
let resizeStartY = 0;
let resizeStartEnd = "";
let resizeRowHeight = 48; // px per 30min slot

function startResizeJob(e, jobId){
  e.preventDefault();
  e.stopPropagation();
  resizingJobId = jobId;
  resizeStartY = e.clientY;
  const j = jobs.find(x=>x.id===jobId);
  resizeStartEnd = j ? (j.endTime||j.startTime||j.time) : "";
  document.body.style.userSelect = "none";
  document.body.style.cursor = "ns-resize";
  document.addEventListener("mousemove", onResizeMove);
  document.addEventListener("mouseup", onResizeUp);
  // touch
  document.addEventListener("touchmove", onResizeTouchMove, {passive:false});
  document.addEventListener("touchend", onResizeTouchUp);
}

function onResizeTouchMove(e){
  e.preventDefault();
  const touch = e.touches[0];
  doResizeMove(touch.clientY);
}
function onResizeTouchUp(e){
  doResizeUp();
}
function onResizeMove(e){ doResizeMove(e.clientY); }
function onResizeUp(e){ doResizeUp(); }

function doResizeMove(clientY){
  if(!resizingJobId) return;
  const j = jobs.find(x=>x.id===resizingJobId);
  if(!j) return;
  const dy = clientY - resizeStartY;
  const slotsDelta = Math.round(dy / resizeRowHeight);
  const endIdx = timeIndex(resizeStartEnd);
  if(endIdx < 0) return;
  const startIdx = timeIndex(j.startTime||j.time);
  // 最少佔 1 格（含 start 和 end 同一列）
  const newEndIdx = Math.max(startIdx, Math.min(endIdx + slotsDelta, times.length - 1));
  const newEnd = times[newEndIdx];
  if(newEnd !== j.endTime){
    j.endTime = newEnd;
    renderSchedule();
  }
}

function doResizeUp(){
  if(!resizingJobId) return;
  saveJobs();
  renderJobList();
  resizingJobId = null;
  document.body.style.userSelect = "";
  document.body.style.cursor = "";
  document.removeEventListener("mousemove", onResizeMove);
  document.removeEventListener("mouseup", onResizeUp);
  document.removeEventListener("touchmove", onResizeTouchMove);
  document.removeEventListener("touchend", onResizeTouchUp);
  showToast("✅ 時間已調整");
}

function calcSpan(job){
  const s=timeIndex(job.startTime||job.time);
  const e=timeIndex(job.endTime);
  if(s<0) return 1;
  if(e<s) return 1;
  // 顯示方式改回「含結束時間」：
  // 09:30~10:00 佔 09:30、10:00 兩列
  // 09:30~10:30 佔 09:30、10:00、10:30 三列
  return e - s + 1;
}

function isCoveredByPreviousJob(dateStr, engineer, timeIndexNow){
  return jobs.some(j=>{
    if(j.date!==dateStr || j.engineer!==engineer) return false;
    const s=timeIndex(j.startTime||j.time);
    const span=calcSpan(j);
    // 被前面的工作蓋住：timeIndexNow 在 s 之後，且在 s+span 範圍內
    return s>=0 && timeIndexNow>s && timeIndexNow<s+span;
  });
}

function getEngineerDayPlaceLabel(dateStr, engineer){
  // 工程師標題下方只顯示當天會去的「縣市」，不要把區域全部列出來
  const cities=[];
  jobs.filter(j=>j.date===dateStr && j.engineer===engineer).forEach(j=>{
    const city=String(j.city||"").trim();
    if(city && !cities.includes(city)) cities.push(city);
  });
  return cities.length ? cities.join("、") : "";
}

function renderSchedule(){
  // normalize old imported engineer names/codes
  jobs.forEach(j=>{ j.engineer=normalizeEngineerName(j.engineer); });

  const dates=getScheduleDates();
  const table=document.getElementById("schedule");
  table.className="week-schedule-table";
  const today=formatDateLocal(new Date());

  let html="<tr><th class='time-col' rowspan='2'>時間</th>";
  dates.forEach(dateStr=>{
    const d=parseDateLocal(dateStr);
    const weekend=d.getDay()===0 || d.getDay()===6;
    const cls=dateStr===today ? "today-head" : (weekend ? "weekend-head" : "date-head");
    html+=`<th class="${cls}" colspan="${engineers.length}">${dateStr}　${getWeekdayName(dateStr)}</th>`;
  });
  html+="</tr><tr>";
  dates.forEach(dateStr=>{
    engineers.forEach(e=>{
      const placeLabel=getEngineerDayPlaceLabel(dateStr,e);
      html+=`<th class="engineer-head">${displayEngineer(e)}${placeLabel?`<span class="eng-place">${escapeHtml(placeLabel)}</span>`:""}</th>`;
    });
  });
  html+="</tr>";

  times.forEach((time,idx)=>{
    // 使用完整版格式：沒有派工起始的時間列自動壓縮高度
    const rowHasNewJob = dates.some(dateStr=>
      engineers.some(engineer=>
        jobs.some(j=>j.date===dateStr&&j.engineer===engineer&&(j.time===time||j.startTime===time))
      )
    );
    const trH = rowHasNewJob ? '' : ' style="height:24px;"';
    const tdStyle = rowHasNewJob ? '' : ' style="font-size:11px;padding:1px 4px;"';

    html+=`<tr${trH}><td class="time-col"${tdStyle}>${time}</td>`;

    dates.forEach(dateStr=>{
      engineers.forEach(engineer=>{
        if(isCoveredByPreviousJob(dateStr, engineer, idx)){
          return;
        }

        const cellJobs=jobs.filter(j=>j.date===dateStr&&j.engineer===engineer&&(j.time===time||j.startTime===time));
        let span=1;
        if(cellJobs.length>0){
          span=Math.max(...cellJobs.map(j=>calcSpan(j)));
        }

        html+=`<td class="slot ${cellJobs.length?`job-slot-active`:``}" rowspan="${span}" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" ondrop="dropJobMulti(event,'${dateStr}','${engineer}','${time}')">`;
        cellJobs.forEach(j=>html+=jobCard(j));
        html+="</td>";
      });
    });

    html+="</tr>";
  });

  table.innerHTML=html;
  table.style.minWidth = "6800px";
  renderSummary();
}

function jobCard(j){
  const address = j.address

  const timeText = `${j.startTime || j.time || ""}${j.endTime ? " ~ " + j.endTime : ""}`;

  const span = calcSpan(j);
  // 每半小時一格約 74px，減掉一點內距，讓 09:30~10:30 剛好撐滿 09:30 與 10:00 兩格，到 10:30 邊界
  const jobHeight = 0;

  const statusList = Array.isArray(j.statusList) ? j.statusList : (j.status ? [j.status] : []);
  const statusOptions = ["已印單","已確認","已提醒"];

  </div>`;

  return `<div class="job" style="" draggable="true" ondragstart="dragStart(${j.id})">
    <div class="job-top">
      <div class="card-main" style="cursor:pointer;" onclick="editJobForm(${j.id},event)" title="點擊修改此筆派工資料">${escapeHtml(codeName)}</div>
      <div class="actions">
        <button class="edit" onclick="editJobForm(${j.id},event)">改</button>
        <button class="delete" onclick="deleteJob(${j.id})">X</button>
      </div>
    </div>

    ${timeText.trim() ? `<div class="card-time">時間：${escapeHtml(timeText)}</div>` : ""}
    ${j.phone ? `<div class="card-line">電話：${escapeHtml(j.phone)}</div>` : ""}
    ${address}
    ${j.workItem ? `<div class="card-line card-work">施工項目：${escapeHtml(j.workItem)}</div>` : ""}
    ${j.workContent ? `<div class="card-line">施工內容：${escapeHtml(j.workContent)}</div>` : ""}
    ${statusHtml}
    <div class="job-resize-handle"
      onmousedown="startResizeJob(event,${j.id})"
      ontouchstart="startResizeJob(event,${j.id})"
      onclick="event.stopPropagation()"
      title="拖拉調整結束時間">
      <span>⠿</span>
    </div>
  </div>`;
}

// 無效件關鍵字（施工項目或施工內容含這些字的不列入統計）
const INVALID_KEYWORDS = ["請假","車程","出差","補休","休假","公假"];

function isValidJob(j){
  const item = String(j.workItem||"");
  const content = String(j.workContent||"");
  return !INVALID_KEYWORDS.some(kw => item.includes(kw) || content.includes(kw));
}

function updateJobStatus(id, status){
  const j = jobs.find(x=>x.id===id);
  if(!j) return;
  j.status = status;
  saveJobs();
  renderSchedule();
  renderJobList();
}

function toggleJobStatusFlag(id, flag, checked){
  const j = jobs.find(x=>x.id===id);
  if(!j) return;
  let arr = Array.isArray(j.statusList) ? [...j.statusList] : (j.status ? [j.status] : []);
  if(checked && !arr.includes(flag)) arr.push(flag);
  if(!checked) arr = arr.filter(x=>x!==flag);
  j.statusList = arr;
  j.status = arr.join("、");
  saveJobs();
  renderJobList();
}

function renderSummary(){
  const dates=getScheduleDates();
  const rangeJobs=jobs.filter(j=>dates.includes(j.date));
  const validJobs=rangeJobs.filter(isValidJob);
  let title=`${dates[0]} ～ ${dates[dates.length-1]}`;

function setupFixedBottomScrollbar(){
  const wrap = document.getElementById("scheduleWrap") || document.querySelector(".table-wrap");
  const table = document.getElementById("schedule");
  const bar = document.getElementById("fixedBottomScroll");
  const inner = document.getElementById("fixedBottomScrollInner");

  if(!wrap || !table || !bar || !inner) return;

  const scrollWidth = Math.max(6800, table.scrollWidth, wrap.scrollWidth);
  table.style.minWidth = scrollWidth + "px";
  inner.style.width = scrollWidth + "px";
  bar.style.display = "block";

  if(bar.dataset.syncReady !== "1"){
    bar.dataset.syncReady = "1";

    let syncingFromBar = false;
    let syncingFromWrap = false;

    bar.addEventListener("scroll", function(){
      if(syncingFromWrap) return;
      syncingFromBar = true;
      wrap.scrollLeft = bar.scrollLeft;
      syncingFromBar = false;
    });

    wrap.addEventListener("scroll", function(){
      if(syncingFromBar) return;
      syncingFromWrap = true;
      bar.scrollLeft = wrap.scrollLeft;
      syncingFromWrap = false;
    });

    window.addEventListener("resize", function(){
      setupFixedBottomScrollbar();
    });
  }

  bar.scrollLeft = wrap.scrollLeft;
}

function scrollSchedule(px){
  const wrap = document.getElementById("scheduleWrap") || document.querySelector(".table-wrap");
  const bar = document.getElementById("fixedBottomScroll");
  if(wrap){
    wrap.scrollLeft += px;
    if(bar) bar.scrollLeft = wrap.scrollLeft;
  }
}

function dropJobMulti(e,dateStr,engineer,time){
  e.preventDefault();
  e.currentTarget.classList.remove("drop-hover");
  jobs.forEach(j=>{
    if(j.id===dragId){
      const oldStart=timeIndex(j.startTime||j.time);
      const oldEnd=timeIndex(j.endTime);
      const duration=(oldStart>=0 && oldEnd>=oldStart) ? (oldEnd-oldStart) : 1;
      const newStart=timeIndex(time);
      const newEnd=times[Math.min(newStart+duration, times.length-1)];
      j.engineer=engineer;
      j.startTime=time;
      j.time=time;
      j.endTime=newEnd;
      j.date=dateStr;
    }
  });
  saveJobs();
  renderSchedule();
  renderJobList();
}

  if(idx>=0){if(confirm("此客戶編號已存在，要覆蓋嗎？"))customers[idx]={...customers[idx],...c}}else customers.push(c);
  saveCustomers();renderCustomers();
  ["cCustomerNo","cPersonName","cFullName","cShortName","cMobile","cDeliveryAddress"].forEach(id=>document.getElementById(id).value="");
}

function renderCustomers(){
  const kw=document.getElementById("customerSearch").value.trim().toLowerCase();
  const list=customers.filter(c=>`${c.customerNo} ${c.personName} ${c.fullName} ${c.shortName} ${c.mobile} ${c.deliveryAddress}`.toLowerCase().includes(kw));

  list.forEach(c=>{
    html+=`<tr>
      <td><button class="edit" onclick="editCustomer(${c.id})">改</button> <button class="delete" onclick="deleteCustomer(${c.id})">X</button></td>
      <td>${escapeHtml(c.customerNo)}</td>
      <td>${escapeHtml(c.personName)}</td>
      <td>${escapeHtml(c.fullName)}</td>
      <td>${escapeHtml(c.shortName)}</td>
      <td>${escapeHtml(c.mobile)}</td>
      <td>${c.deliveryAddress?`<a href="${mapUrl(c.deliveryAddress)}" target="_blank">${escapeHtml(c.deliveryAddress)}</a>`:""}</td>
    </tr>`;
  });
  document.getElementById("customerTable").innerHTML=html;
}

function editCustomer(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const customerNo=prompt("客戶編號",c.customerNo||"");if(customerNo===null)return;
  const personName=prompt("人員姓名",c.personName||"");if(personName===null)return;
  const fullName=prompt("客戶全稱",c.fullName||"");if(fullName===null)return;
  const shortName=prompt("客戶簡稱",c.shortName||"");if(shortName===null)return;
  const mobile=prompt("行動電話",c.mobile||"");if(mobile===null)return;
  const deliveryAddress=prompt("送貨地址",c.deliveryAddress||"");if(deliveryAddress===null)return;
  Object.assign(c,{customerNo,personName,fullName,shortName,mobile,deliveryAddress});
  saveCustomers();renderCustomers();
}

function deleteCustomer(id){
  if(!confirm("確定刪除此客戶資料？"))return;
  customers=customers.filter(c=>c.id!==id);saveCustomers();renderCustomers();
}
function backupAllData(){
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    jobs: jobs,
    customers: customers
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  a.download = `派工表備份_${ds}.json`;
  a.click();
}

function restoreBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.customers && !data.jobs){ alert("備份檔格式不正確"); return; }
      if(data.customers && data.customers.length > 0){
        if(confirm(`還原 ${data.customers.length} 筆客戶資料？（會覆蓋現有客戶資料）`)){
          customers = data.customers;
          saveCustomers();
          renderCustomers();
        }
      }
      if(data.jobs && data.jobs.length > 0){
        if(confirm(`還原 ${data.jobs.length} 筆派工資料？（會覆蓋現有派工資料）`)){
          jobs = data.jobs;
          saveJobs();
          renderSchedule();
          renderJobList();
        }
      }
      alert("還原完成！");
    }catch(err){
      alert("讀取備份失敗：" + err.message);
    }
    event.target.value = "";
  };
  reader.readAsText(file);
}

function clearCustomers(){

function updateCustomerCodeList(){
  const list=document.getElementById("customerCodeList");

function cleanHeader(text){
  return String(text||"").replace(/\s/g,"").trim();
}

function findHeaderIndex(headers, names){
  const cleaned=headers.map(h=>cleanHeader(h));
  for(const name of names){
    const idx=cleaned.indexOf(cleanHeader(name));
    if(idx>=0) return idx;
  }
  return -1;
}

function combinePhones(phoneA, phoneB){
  const a=String(phoneA||"").trim();
  const b=String(phoneB||"").trim();
  const arr=[];
  if(a) arr.push(a);
  if(b && b!==a) arr.push(b);
  return arr.join(" / ");
}

function normalizeCustomerFromArray(row, idx){
  const customerNo = row[idx.customerNo] || "";
  const personName = row[idx.personName] || "";
  const fullName = row[idx.fullName] || "";
  const shortName = row[idx.shortName] || "";
  const mobile = combinePhones(row[idx.mobile], row[idx.contact1]);
  const deliveryAddress = row[idx.deliveryAddress] || "";

  return {
    id:Date.now()+Math.floor(Math.random()*999999),
    customerNo:String(customerNo||"").trim(),
    personName:String(personName||"").trim(),
    fullName:String(fullName||"").trim(),
    shortName:String(shortName||"").trim(),
    mobile:String(mobile||"").trim(),
    deliveryAddress:String(deliveryAddress||"").trim()
  };
}

function findCustomerSheet(workbook){
  let best=null;
  workbook.SheetNames.forEach(sheetName=>{
    const sheet=workbook.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:"",raw:false});
    for(let r=0;r<Math.min(rows.length,30);r++){
      const headers=rows[r]||[];
      const idx={
        customerNo:findHeaderIndex(headers,["客戶編號","客戶代號","客編"]),
        personName:findHeaderIndex(headers,["人員姓名","姓名","聯絡人"]),
        fullName:findHeaderIndex(headers,["客戶全稱","客戶名稱","全稱"]),
        shortName:findHeaderIndex(headers,["客戶簡稱","簡稱"]),
        mobile:findHeaderIndex(headers,["行動電話","手機"]),
        contact1:findHeaderIndex(headers,["聯絡電話一","連絡電話一","聯絡電話1","連絡電話1"]),
        deliveryAddress:findHeaderIndex(headers,["送貨地址","地址"])
      };

      let score=0;
      Object.values(idx).forEach(v=>{if(v>=0)score++});
      if(score>=4 && (!best || score>best.score)){
        best={sheetName,rows,headerRow:r,headers,idx,score};
      }
    }
  });
  return best;
}

function importExcel(event){
  const file=event.target.files[0];
  if(!file)return;

  if(typeof XLSX==="undefined"){
    alert("Excel 讀取套件沒有載入成功，請確認有網路後再重新開啟 HTML 檔。");
    return;
  }

  const reader=new FileReader();
  reader.onload=function(e){
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:"array"});
    const found=findCustomerSheet(wb);

    if(!found){
      document.getElementById("importStatus").innerHTML="匯入失敗：找不到包含客戶欄位的工作表。請確認 Excel 有「客戶編號、人員姓名、客戶全稱、客戶簡稱、行動電話、聯絡電話一、送貨地址」等欄位。";
      alert("找不到可匯入的客戶資料欄位");
      event.target.value="";
      return;
    }

    let count=0;
    let skipped=0;

    for(let r=found.headerRow+1;r<found.rows.length;r++){
      const row=found.rows[r]||[];
      const c=normalizeCustomerFromArray(row,found.idx);

      if(!c.customerNo && !c.fullName && !c.personName){
        skipped++;
        continue;
      }

      const idx=customers.findIndex(x=>x.customerNo&&x.customerNo===c.customerNo);
      if(idx>=0) customers[idx]={...customers[idx],...c};
      else customers.push(c);
      count++;
    }

    saveCustomers();
    renderCustomers();

    document.getElementById("importStatus").innerHTML=
      `已匯入 ${count} 筆客戶資料。來源工作表：${escapeHtml(found.sheetName)}，標題列：第 ${found.headerRow+1} 列。<br>`+
      `顯示欄位只保留：客戶編號、人員姓名、客戶全稱、客戶簡稱、行動電話、送貨地址。<br>`+
      `行動電話欄已合併 Excel 的「行動電話」與「聯絡電話一」。`;

    alert("已匯入 "+count+" 筆客戶資料");
    event.target.value="";
  };
  reader.readAsArrayBuffer(file);
}

function renderJobList(){
  const month = document.getElementById("listMonth").value;
  const custFilter = (document.getElementById("listCustomerFilter")||{}).value || "";
  const kw = custFilter.trim().toLowerCase();

  const list = jobs
    .filter(j => {
      const monthOk = !month || String(j.date || "").slice(0,7) === month;
      const custOk = !kw || [j.customerCode, j.customerName, j.codeName, j.orderNo]
        .some(v => String(v||"").toLowerCase().includes(kw));
      return monthOk && custOk;
    })
    .sort((a,b)=>(String(a.date)+String(a.startTime||a.time)+String(a.engineer)).localeCompare(String(b.date)+String(b.startTime||b.time)+String(b.engineer)));

  // 顯示篩選提示
  const badge = document.getElementById("listFilterBadge");
  if(badge){
    if(kw){
      badge.style.display="block";
      badge.innerHTML=`<span style="background:#e8f4fd;border:1px solid #3498db;border-radius:12px;padding:3px 10px;color:#1a5276;">🔍 篩選：「${escapeHtml(custFilter)}」　共 ${list.length} 筆　<a href="#" onclick="clearListFilter();return false;" style="color:#e74c3c;margin-left:6px;">✕ 清除</a></span>`;
    } else {
      badge.style.display="none";
    }
  }

  let html="<tr><th>操作</th><th>工程人員</th><th>排工日期</th><th>排工時間</th><th>結束時間</th><th>訂單單號</th><th>客編</th><th>客名</th><th>客編&客名</th><th>客人電話</th><th>縣市</th><th>區域</th><th>地址</th><th>施工項目</th><th>施工內容</th><th>銷售金額</th><th>付款方式</th></tr>";

  list.forEach(j=>{
    const highlight = kw ? 'style="background:#fffde7;"' : '';
    html+=`<tr ${highlight}>
      <td><button class="edit" onclick="editJobForm(${j.id},event)">改</button> <button class="delete" onclick="deleteJob(${j.id})">X</button></td>
      <td>${escapeHtml(j.engineer)}</td>
      <td>${escapeHtml(j.date)}</td>
      <td>${escapeHtml(j.startTime||j.time)}</td>
      <td>${escapeHtml(j.endTime)}</td>
      <td>${escapeHtml(j.orderNo)}</td>
      <td>${escapeHtml(j.customerCode)}</td>
      <td>${escapeHtml(j.customerName)}</td>
      <td>${escapeHtml(j.codeName)}</td>
      <td>${escapeHtml(j.phone)}</td>
      <td>${escapeHtml(j.city)}</td>
      <td>${escapeHtml(j.district)}</td>
      <td>${j.address?`<a href="${mapUrl(j.address)}" target="_blank">${escapeHtml(j.address)}</a>`:""}</td>
      <td>${escapeHtml(j.workItem)}</td>
      <td>${escapeHtml(j.workContent)}</td>
      <td>${escapeHtml(j.amount)}</td>
      <td>${escapeHtml(j.payment)}</td>
    </tr>`;
  });

  document.getElementById("jobListTable").innerHTML=html;
}

function enableDragScroll(){
  const el=document.getElementById("scheduleWrap");
  if(!el || el.dataset.dragReady==="1") return;
  el.dataset.dragReady="1";

  let isDown=false;
  let startX=0;
  let scrollLeft=0;

  el.addEventListener("mousedown",function(e){
    if(e.target.closest("button") || e.target.closest("a") || e.target.closest(".job")) return;
    isDown=true;
    startX=e.pageX - el.offsetLeft;
    scrollLeft=el.scrollLeft;
  });

  el.addEventListener("mouseleave",function(){isDown=false;});
  el.addEventListener("mouseup",function(){isDown=false;});

  el.addEventListener("mousemove",function(e){
    if(!isDown) return;
    e.preventDefault();
    const x=e.pageX - el.offsetLeft;
    const walk=(x-startX)*1.3;
    el.scrollLeft=scrollLeft-walk;
  });
}

enableDragScroll();

function getExportDateRange(){
  const s1=document.getElementById("exportStartDate");
  const e1=document.getElementById("exportEndDate");
  const s2=document.getElementById("exportStartDateList");
  const e2=document.getElementById("exportEndDateList");
  let startDate=(s1&&s1.value)||(s2&&s2.value)||"";
  let endDate=(e1&&e1.value)||(e2&&e2.value)||"";
  const monthInput=document.getElementById("listMonth");
  const month=monthInput ? monthInput.value : "";
  if(!startDate && !endDate && month){
    startDate=month+"-01";
    const [y,m]=month.split("-").map(Number);
    const last=new Date(y,m,0).getDate();
    endDate=month+"-"+String(last).padStart(2,"0");
  }
  return {startDate,endDate};
}

function exportJobs(){
  const {startDate,endDate}=getExportDateRange();
  if(startDate && endDate && startDate>endDate){
    alert("匯出起日不可大於迄日");
    return;
  }
  const exportList = jobs.filter(j=>{
    const d=String(j.date||"");
    if(startDate && d<startDate) return false;
    if(endDate && d>endDate) return false;
    return true;
  });

  if(exportList.length===0){
    alert("此日期區間沒有派工資料");
    return;
  }

  const data=exportList.map(j=>({
    "工程人員":j.engineer,
    "排工日期":j.date,
    "排工時間":j.startTime||j.time,
    "結束時間":j.endTime,
    "訂單單號":j.orderNo,
    "客編":j.customerCode,
    "客名":j.customerName,
    "客編&客名":j.codeName,
    "客人電話":j.phone,
    "縣市":j.city,
    "區域":j.district,
    "地址":j.address,
    "施工項目":j.workItem,
    "施工內容":j.workContent,
    "銷售金額":j.amount,
    "付款方式":j.payment
  }));

  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"派工資料");
  let fileName="派工資料.xlsx";
  if(startDate || endDate){
    fileName=`派工資料_${startDate||"不限"}_${endDate||"不限"}.xlsx`;
  }
  XLSX.writeFile(wb,fileName);
}
